name: Sync Syntaur Version

on:
  repository_dispatch:
    types: [syntaur-published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Syntaur version to sync (without v prefix)'
        required: true

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Wait for npm registry to index version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ATTEMPTS=20
          INTERVAL=6
          for i in $(seq 1 $ATTEMPTS); do
            if npm view "syntaur@$VERSION" version >/dev/null 2>&1; then
              echo "syntaur@$VERSION is live on the registry (attempt $i)."
              exit 0
            fi
            echo "Attempt $i/$ATTEMPTS: syntaur@$VERSION not yet on registry; sleeping ${INTERVAL}s..."
            sleep "$INTERVAL"
          done
          echo "ERROR: syntaur@$VERSION never appeared on the registry after $((ATTEMPTS * INTERVAL))s." >&2
          exit 1

      - name: Update syntaur dependency
        run: npm install "syntaur@${{ steps.version.outputs.version }}" --save-exact --ignore-scripts

      - name: Mirror app version
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            echo "No changes to commit — already at v${{ steps.version.outputs.version }}"
            exit 0
          fi
          git commit -m "chore: sync syntaur v${{ steps.version.outputs.version }}"
          git tag -a "v${{ steps.version.outputs.version }}" -m "v${{ steps.version.outputs.version }}"
          echo "push=true" >> "$GITHUB_OUTPUT"
        id: commit

      - name: Push changes and tag
        if: steps.commit.outputs.push == 'true'
        run: git push origin main --follow-tags
